version: '3.8'

services:
  web:
    build: .
    container_name: gym_web
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym_network

  db:
    image: mysql:8.0
    container_name: gym_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gym_ma_db}
      MYSQL_USER: ${MYSQL_USER:-gymuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gympass123}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - gym_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gym_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      - db
    ports:
      - "8081:80"
    networks:
      - gym_network

networks:
  gym_network:
    driver: bridge

volumes:
  db_data: